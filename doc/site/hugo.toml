baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'Recoil Engine'

[markup.goldmark.renderer]
  unsafe = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"#'github.com/SlashScreen/hugo-book'

[params]
   #BookTheme = 'dark'
   #BookSection = '*'
   #BookCollapseSection=true
   
   [footer]
    enable = true
    displayCopyright = true 
    displayuPoweredBy = true

  [search]
    enable = true
    type = "flexsearch"

[[menu.main]]
  identifier = "documentation"
  name = "Documentation"
  pageRef = "/docs"
  weight = 1

[[menu.main]]
  identifier = "articles"
  name = "Articles"
  pageRef = "/articles"
  weight = 1

[[menu.main]]
  identifier = "development"
  name = "Development"
  pageRef = "/development"
  weight = 1

[[menu.main]]
  identifier = "changelogs"
  name = "Changelogs"
  pageRef = "/changelogs"
  weight = 1
